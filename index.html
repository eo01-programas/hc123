<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilo Costura - PCP Textil</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #eff6ff;
            --success: #059669;
            --danger: #dc2626;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --white: #ffffff;
            --row-group-a: #d9e6ff;
            --row-group-b: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            font-family: Calibri, "Segoe UI", sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 20;
            overflow: hidden;
            min-height: 56px;
        }

        .brand {
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-800);
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .btn {
            border: 1px solid var(--gray-300);
            background: var(--white);
            color: var(--gray-800);
            border-radius: 7px;
            padding: 7px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
        }

        .btn:hover {
            background: var(--gray-100);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .btn-icon {
            width: 34px;
            min-width: 34px;
            height: 34px;
            min-height: 34px;
            border-radius: 999px;
            padding: 0;
            font-size: 17px;
            line-height: 1;
        }

        .container {
            padding: 6px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }

        .toolbar {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
        }

        .toolbar-group {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
            min-width: 0;
        }

        .filter-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--gray-700);
            white-space: nowrap;
        }

        .filter-select {
            border: 1px solid var(--gray-300);
            border-radius: 7px;
            padding: 4px 6px;
            font-size: 11px;
            font-weight: 700;
            background: var(--white);
            color: var(--gray-800);
            width: 120px;
            min-width: 120px;
            max-width: 120px;
        }

        .filter-select.small {
            width: 92px;
            min-width: 92px;
            max-width: 92px;
        }

        #filter-status {
            width: 92px;
            min-width: 92px;
            max-width: 92px;
        }

        #filter-hilo-dato {
            width: 150px;
            min-width: 150px;
            max-width: 150px;
        }

        #filter-cliente {
            width: 110px;
            min-width: 110px;
            max-width: 110px;
        }

        #filter-rsv {
            width: 82px;
            min-width: 82px;
            max-width: 82px;
        }

        #filter-color {
            width: 118px;
            min-width: 118px;
            max-width: 118px;
        }

        #filter-op {
            width: 92px;
            min-width: 92px;
            max-width: 92px;
        }

        .switch-inline {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-left: 2px;
            user-select: none;
            white-space: nowrap;
        }

        .switch-inline input[type="checkbox"] {
            width: 38px;
            height: 21px;
            appearance: none;
            background: var(--gray-300);
            border-radius: 999px;
            position: relative;
            cursor: pointer;
            transition: background .18s ease;
            border: none;
            outline: none;
        }

        .switch-inline input[type="checkbox"]::before {
            content: "";
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #fff;
            top: 3px;
            left: 3px;
            transition: transform .18s ease;
        }

        .switch-inline input[type="checkbox"]:checked {
            background: var(--primary);
        }

        .switch-inline input[type="checkbox"]:checked::before {
            transform: translateX(17px);
        }

        .switch-inline label {
            font-size: 12px;
            font-weight: 700;
            color: var(--gray-700);
            cursor: pointer;
        }

        .meta-pill {
            border: 1px solid var(--gray-300);
            border-radius: 999px;
            padding: 5px 10px;
            background: var(--gray-50);
            color: var(--gray-700);
            min-width: 104px;
            text-align: center;
            white-space: nowrap;
            font-size: 11px;
            font-weight: 700;
        }

        .status-msg {
            min-height: 0;
            font-size: 12px;
            font-weight: 700;
            color: var(--gray-700);
            padding: 0;
        }

        .status-msg.ok {
            color: var(--success);
        }

        .status-msg.error {
            color: var(--danger);
        }

        .tabs-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }

        .tab-btn {
            border: 1px solid var(--gray-300);
            background: var(--white);
            color: var(--gray-700);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .tab-btn:hover {
            background: var(--gray-100);
        }

        .tab-btn.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        .loader {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--gray-700);
            font-weight: 700;
            min-width: 150px;
            visibility: hidden;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .saving-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.35);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .saving-modal.show {
            display: flex;
        }

        .saving-modal-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 16px 18px;
            min-width: 220px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.18);
        }

        .saving-text {
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-800);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .table-wrap {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            overflow-x: auto;
            overflow-y: scroll;
            flex: 1;
            min-height: 0;
            max-height: 100%;
            scrollbar-gutter: stable;
        }

        table {
            width: 100%;
            min-width: 1380px;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 12px;
        }

        th {
            background: rgb(0, 112, 192);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.45px;
            font-size: 13px;
            font-weight: 700;
            text-align: left;
            padding: 8px 7px;
            border-bottom: 1px solid var(--gray-200);
            white-space: nowrap;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgb(0, 112, 192);
        }

        th.th-center {
            text-align: center;
        }

        td {
            padding: 6px 7px;
            border-bottom: 1px solid var(--gray-100);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gray-800);
        }

        tr.group-a { background: var(--row-group-a); }
        tr.group-b { background: var(--row-group-b); }

        tr.group-a:hover, tr.group-b:hover {
            box-shadow: inset 0 0 0 9999px rgba(0, 0, 0, 0.12);
        }

        .cell-op {
            font-weight: 700;
            text-align: center;
        }

        .cell-cliente {
            text-align: center;
        }

        .cell-pds {
            text-align: center;
            font-weight: 700;
        }

        .cell-status {
            text-align: center;
            font-weight: 700;
        }

        .cell-rsv {
            text-align: center;
            font-weight: 700;
        }

        .cell-date {
            text-align: center;
        }

        .pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 12px;
            line-height: 1;
            white-space: nowrap;
            vertical-align: middle;
        }

        .pill-pza {
            color: #075985;
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.12);
        }

        .pill-pda {
            color: #065f46;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.12);
        }

        .pill-xpedir {
            color: #9a3412;
            background: rgba(245, 158, 11, 0.22);
            border: 1px solid rgba(245, 158, 11, 0.34);
        }

        .pill-ok-dark {
            color: #ffffff;
            background: rgba(13, 60, 120, 0.9);
            border: 1px solid rgba(13, 60, 120, 0.95);
        }

        .no-data {
            text-align: center;
            color: var(--gray-500);
            font-size: 13px;
            padding: 28px 10px;
        }

        .hilo-select {
            width: 100%;
            min-width: 150px;
            border: 1px solid var(--gray-300);
            border-radius: 7px;
            background: #fff;
            padding: 4px 7px;
            font-size: 11px;
            font-weight: 700;
            color: var(--gray-800);
            height: 28px;
            font-family: Calibri, "Segoe UI", sans-serif;
        }

        .hilo-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .hilo-select:disabled {
            background: var(--gray-100);
            color: #94a3b8;
            cursor: not-allowed;
        }

        @media (max-width: 860px) {
            .container {
                padding: 10px;
            }

            header {
                padding: 8px 10px;
            }

            .toolbar {
                gap: 5px;
            }

            .toolbar-group {
                gap: 4px;
            }

            .brand {
                font-size: 14px;
            }

            .filter-select {
                min-width: 84px;
                max-width: 120px;
            }

            .filter-select.small {
                min-width: 76px;
                max-width: 112px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="toolbar">
            <div class="toolbar-group">
                <div class="brand">HILO COSTURA - PCP Textil</div>
            </div>
            <div class="toolbar-group">
                <span class="filter-label">STATUS:</span>
                <select id="filter-status" class="filter-select small" onchange="onStatusFilterChange(this.value)">
                    <option value="ALL">Todos</option>
                </select>
            </div>
            <div class="toolbar-group">
                <span class="filter-label">Filtro:</span>
                <select id="filter-hilo-dato" class="filter-select" onchange="onFilterChange(this.value)">
                    <option value="ALL">Todos</option>
                    <option value="PENDIENTE">PENDIENTE</option>
                    <option value="EN LABORATORIO">EN LABORATORIO</option>
                    <option value="POR TE&#209;IR">POR TE&#209;IR</option>
                    <option value="EN CALIDAD">EN CALIDAD</option>
                    <option value="X RE-ENCONAR">X RE-ENCONAR</option>
                    <option value="ENTREGADO PARCIAL">ENTREGADO PARCIAL</option>
                    <option value="DESPACHADO">DESPACHADO</option>
                </select>
            </div>
            <div class="toolbar-group">
                <span class="filter-label">CLIENTE:</span>
                <select id="filter-cliente" class="filter-select small" onchange="onClientFilterChange(this.value)">
                    <option value="ALL">Todos</option>
                </select>
            </div>
            <div class="toolbar-group">
                <span class="filter-label">RSV:</span>
                <select id="filter-rsv" class="filter-select small" onchange="onRsvFilterChange(this.value)">
                    <option value="ALL">Todos</option>
                </select>
            </div>
            <div class="toolbar-group">
                <span class="filter-label">COLOR:</span>
                <select id="filter-color" class="filter-select small" onchange="onColorFilterChange(this.value)">
                    <option value="ALL">Todos</option>
                </select>
            </div>
            <div class="toolbar-group">
                <span class="filter-label">OP:</span>
                <select id="filter-op" class="filter-select small" onchange="onOpFilterChange(this.value)">
                    <option value="ALL">Todos</option>
                </select>
            </div>
            <div class="switch-inline">
                <input type="checkbox" id="chk-para-todo" onchange="onParaTodoChange(this.checked)">
                <label for="chk-para-todo">Para Todo</label>
            </div>
            <span id="meta-registros" class="meta-pill">0 registros</span>
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <span>Cargando datos...</span>
            </div>
        </div>
        <div class="header-actions">
            <button type="button" class="btn btn-primary btn-icon" onclick="reloadData()" title="Refrescar" aria-label="Refrescar">&#x21bb;</button>
        </div>
    </header>

    <div class="container">

        <div id="status-msg" class="status-msg"></div>
        <div class="tabs-bar">
            <button id="tab-por-despachar" type="button" class="tab-btn active" onclick="onTabChange('POR_DESPACHAR')">POR DESPACHAR</button>
            <button id="tab-despachado" type="button" class="tab-btn" onclick="onTabChange('DESPACHADO')">DESPACHADO</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th class="th-center" style="width: 90px;">HOD</th>
                        <th class="th-center" style="width: 90px;">F.ING</th>
                        <th class="th-center" style="width: 60px;">RSV</th>
                        <th class="th-center" style="width: 130px;">CLIENTE</th>
                        <th style="width: 180px;">ESTILO</th>
                        <th style="width: 150px;">COLOR</th>
                        <th class="th-center" style="width: 110px;">OP</th>
                        <th class="th-center" style="width: 120px;">PDS GIRADAS</th>
                        <th class="th-center" style="width: 120px;">PDA</th>
                        <th class="th-center" style="width: 110px;">STATUS</th>
                        <th style="width: 170px;">HILO COSTURA</th>
                    </tr>
                </thead>
                <tbody id="tbody-hilos-costura">
                    <tr><td class="no-data" colspan="11">Cargando registros...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="saving-modal" class="saving-modal" aria-live="polite" aria-hidden="true">
        <div class="saving-modal-card">
            <div class="spinner" aria-hidden="true"></div>
            <span id="saving-modal-text" class="saving-text">Guardando datos...</span>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzWV9x39Qw5EcQJtBP9Om8LZdYnFCZ_ikXFuHix9qMo2kWQKMXv2mJ_rLahzNOxRBmhhQ/exec";
        const SHEET_ID = "18cQuwqerdMggAeJ8TCUKA7-gujXsA91-CRMUTNpr8aQ";
        const HILO_CACHE_KEY = "hilo_costura_sheet_cache_v1";

        const FILTER_ALL = "ALL";
        const FILTER_PENDIENTE = "PENDIENTE";
        const FILTER_EN_LABORATORIO = "EN LABORATORIO";
        const FILTER_POR_TENIR = "POR TE\u00D1IR";
        const FILTER_EN_CALIDAD = "EN CALIDAD";
        const FILTER_X_RE_ENCONAR = "X RE-ENCONAR";
        const FILTER_DESPACHADO = "DESPACHADO";

        const TAB_POR_DESPACHAR = "POR_DESPACHAR";
        const TAB_DESPACHADO = "DESPACHADO";
        const EXCLUDED_CLIENT_KEYS = new Set(["AMRETAILSAC", "AMR"]);

        const HILO_OPTIONS = [
            FILTER_PENDIENTE,
            FILTER_EN_LABORATORIO,
            FILTER_POR_TENIR,
            FILTER_EN_CALIDAD,
            FILTER_X_RE_ENCONAR,
            "ENTREGADO PARCIAL",
            FILTER_DESPACHADO
        ];
        const HILO_CANON = {
            "PENDIENTE": FILTER_PENDIENTE,
            "PDTE": FILTER_PENDIENTE,
            "EN LABORATORIO": FILTER_EN_LABORATORIO,
            "POR TE\u00D1IR": FILTER_POR_TENIR,
            "POR TENIR": FILTER_POR_TENIR,
            "EN TE\u00D1IDO": FILTER_POR_TENIR,
            "EN TENIDO": FILTER_POR_TENIR,
            "EN CALIDAD": FILTER_EN_CALIDAD,
            "OK": FILTER_EN_CALIDAD,
            "OK COMPRA": FILTER_EN_CALIDAD,
            "OK RE-ASIGNADO": FILTER_EN_CALIDAD,
            "X RE-ENCONAR": FILTER_X_RE_ENCONAR,
            "DESPACHADO": FILTER_DESPACHADO
        };

        let rawHeaders = [];
        let allRows = [];
        let selectedFilter = FILTER_ALL;
        let selectedStatusFilter = FILTER_ALL;
        let selectedTab = TAB_POR_DESPACHAR;
        let selectedClientFilter = FILTER_ALL;
        let selectedRsvFilter = FILTER_ALL;
        let selectedColorFilter = FILTER_ALL;
        let selectedOpFilter = FILTER_ALL;
        let applyParaTodo = false;
        let uiBusy = false;
        let hiloColHeaderName = "HILO COSTURA";
        const savingGroupKeys = new Set();
        let activeLoadToken = 0;
        let selectOptionsHtmlCache = new Map();

        function normalizeHeaderName(value) {
            return String(value || "")
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]/g, "");
        }

        function normalizeText(value) {
            return String(value || "").toUpperCase().trim();
        }

        function normalizeClientKey(value) {
            return String(value || "")
                .toUpperCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^A-Z0-9]/g, "");
        }

        function isExcludedClient(clienteRaw, clienteNorm) {
            const rawKey = normalizeClientKey(clienteRaw);
            const normKey = normalizeClientKey(clienteNorm);
            return EXCLUDED_CLIENT_KEYS.has(rawKey) || EXCLUDED_CLIENT_KEYS.has(normKey);
        }

        function normalizeClientName(clientName) {
            if (!clientName) return "";
            const name = clientName.toString().toUpperCase();
            if (name.includes("LACOSTE")) return "LAC";
            if (name.includes("ATHLETA, INC.")) return "ATH";
            if (name.includes("ALLBIRDS")) return "ALLB";
            if (name.includes("BANANA REPUBLIC, LLC")) return "BNN";
            if (name.includes("THEORY LLC,")) return "THE";
            if (name.includes("DISH & DUER")) return "DDU";
            if (name.includes("SKECHERS PERFORMANCE")) return "SKE";
            if (name.includes("LULULEMON ATHLETICA CANADA INC")) return "LLL";
            if (name.includes("AM RETAIL S.A.C.")) return "AMR";
            return clientName;
        }

        function escapeHtml(text) {
            return String(text === null || text === undefined ? "" : text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function getCachedSheetData() {
            try {
                const raw = localStorage.getItem(HILO_CACHE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : null;
            } catch (e) {
                return null;
            }
        }

        function saveSheetDataCache(data) {
            try {
                localStorage.setItem(HILO_CACHE_KEY, JSON.stringify(data));
            } catch (e) {
                // Si el navegador bloquea el cache o se llena, seguimos sin cache.
            }
        }

        function normalizeSheetDataArray(data) {
            if (!Array.isArray(data) || !data.length) return null;
            const firstRow = data[0];
            if (!Array.isArray(firstRow) || !firstRow.length) return null;
            return data;
        }

        function sheetDataFromGviz(jsonResponse) {
            if (!jsonResponse || !jsonResponse.table) {
                throw new Error("Datos invalidos del sheet.");
            }

            const headers = (jsonResponse.table.cols || []).map(col => String((col && (col.label || col.id)) || "").trim());
            const rowsRaw = (jsonResponse.table.rows || []).map(r => {
                const cells = (r && Array.isArray(r.c)) ? r.c : [];
                return cells.map(cell => (cell && cell.v !== null && cell.v !== undefined) ? cell.v : "");
            });

            if (!headers.length) {
                throw new Error("No se encontraron encabezados.");
            }

            return [headers, ...rowsRaw];
        }

        function resetHiloSelectOptionsCache() {
            selectOptionsHtmlCache = new Map();
        }

        function getHiloSelectOptionsHtml(currentValue) {
            const current = canonicalizeHiloValue(currentValue);
            if (selectOptionsHtmlCache.has(current)) {
                return selectOptionsHtmlCache.get(current);
            }

            const opts = HILO_OPTIONS.slice();
            if (!opts.includes(current)) opts.unshift(current);

            const html = opts.map(opt => {
                const selected = opt === current ? " selected" : "";
                return "<option value=\"" + escapeHtml(opt) + "\"" + selected + ">" + escapeHtml(opt) + "</option>";
            }).join("");

            selectOptionsHtmlCache.set(current, html);
            return html;
        }

        function parseHiloDateValue(rawValue) {
            if (rawValue instanceof Date && !isNaN(rawValue.getTime())) return rawValue;

            if (typeof rawValue === "number" && rawValue > 30000) {
                return new Date(Math.round((rawValue - 25569) * 86400 * 1000));
            }

            const text = String(rawValue || "").trim();
            if (!text) return null;

            const dateMatch = text.match(/^Date\((\d+),(\d+),(\d+)(?:,\d+,\d+,\d+)?\)$/);
            if (dateMatch) {
                return new Date(parseInt(dateMatch[1], 10), parseInt(dateMatch[2], 10), parseInt(dateMatch[3], 10));
            }

            const isoMatch = text.match(/^(\d{4})-(\d{2})-(\d{2})(?:[T\s].*)?$/);
            if (isoMatch) {
                return new Date(parseInt(isoMatch[1], 10), parseInt(isoMatch[2], 10) - 1, parseInt(isoMatch[3], 10));
            }

            const dmMatch = text.match(/^(\d{1,2})[\/\-]([A-Za-z]{3,}|\d{1,2})[\/\-](\d{2,4})$/);
            if (dmMatch) {
                const day = parseInt(dmMatch[1], 10);
                const monthToken = dmMatch[2].toLowerCase().slice(0, 3);
                const yearNum = parseInt(dmMatch[3], 10);
                const monthMap = {
                    ene: 0, feb: 1, mar: 2, abr: 3, may: 4, jun: 5,
                    jul: 6, ago: 7, sep: 8, oct: 9, nov: 10, dic: 11
                };
                let month = -1;
                if (/^\d{1,2}$/.test(dmMatch[2])) {
                    month = parseInt(dmMatch[2], 10) - 1;
                } else {
                    month = monthMap[monthToken] ?? -1;
                }
                if (month >= 0) {
                    const year = yearNum < 100 ? 2000 + yearNum : yearNum;
                    return new Date(year, month, day);
                }
            }

            const fallback = new Date(text);
            if (!isNaN(fallback.getTime())) return fallback;
            return null;
        }

        function formatHiloDateShort(rawValue) {
            const dt = parseHiloDateValue(rawValue);
            if (!dt) return String(rawValue || "").trim();
            const meses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
            const day = String(dt.getDate()).padStart(2, "0");
            const month = meses[dt.getMonth()] || "";
            return day + "/" + month;
        }

        function formatHiloDateCell(rawValue) {
            if (rawValue === null || rawValue === undefined || rawValue === "") return "";

            const parts = Array.isArray(rawValue)
                ? rawValue
                : String(rawValue).split(/\r?\n|;|\|/);

            const formatted = parts
                .map(part => formatHiloDateShort(part))
                .map(part => String(part || "").trim())
                .filter(Boolean);

            return formatted.join(" - ");
        }

        function getHabilitadoStatusValue(row) {
            const rutaTela = String(row.rutaTela || "").toUpperCase().trim();
            const estadoCorte = String(row.estadoCorte || "").toUpperCase().trim();
            const estadoBloqueo = String(row.estadoBloqueo || "").toUpperCase().trim();
            const estadoLavada = String(row.estadoLavada || "").toUpperCase().trim();
            const evNorm = String(row.estadoEnumerado || "").toUpperCase().trim();

            if (rutaTela === "ACABADA") {
                if (estadoCorte === "" || estadoCorte === "X PROG") return "x cortar";
                if (estadoCorte === "PROG" || estadoCorte === "PROG 1T" || estadoCorte === "PROG 2T" || estadoCorte === "PROG 3T") return "Proc Corte";
                if (estadoCorte === "OK") {
                    if (evNorm === "" || evNorm === "X PROG") return "x enm";
                    if (evNorm === "OK ENM" || evNorm === "OK PAQUETEO") return "x Hab";
                    return "x enm";
                }
            } else if (rutaTela === "LAVADA") {
                if (estadoBloqueo === "") return "x pedir";
                if (estadoBloqueo.indexOf("PROG") !== -1) return "x bloq";
                if (estadoBloqueo === "OK") {
                    if (estadoLavada !== "OK") return "x lavar";
                    if (estadoCorte === "" || estadoCorte === "X PROG") return "x cortar";
                    if (estadoCorte === "PROG" || estadoCorte === "PROG 1T" || estadoCorte === "PROG 2T" || estadoCorte === "PROG 3T") return "Proc Corte";
                    if (estadoCorte === "OK") {
                        if (evNorm === "OK ENM" || evNorm === "OK PAQUETEO") return "x Hab";
                        return "x enm";
                    }
                }
                return "x bloq";
            }

            return "";
        }

        function renderStatusPill(statusValue) {
            const value = String(statusValue || "").trim();
            if (!value) return "";

            const statusUpper = value.toUpperCase();
            if (statusUpper.indexOf("X CORTAR") !== -1) return '<span class="pill pill-pda">' + escapeHtml(value) + "</span>";
            if (statusUpper.indexOf("PROC CORTE") !== -1) return '<span class="pill pill-pza">' + escapeHtml(value) + "</span>";
            if (statusUpper.indexOf("X PEDIR") !== -1) return '<span class="pill pill-xpedir">' + escapeHtml(value) + "</span>";
            if (statusUpper.indexOf("X ENM") !== -1) return '<span class="pill pill-pda">' + escapeHtml(value) + "</span>";
            if (statusUpper.indexOf("X HAB") !== -1) return '<span class="pill pill-ok-dark">' + escapeHtml(value) + "</span>";
            if (statusUpper.indexOf("X BLOQ") !== -1) return '<span class="pill pill-pda">' + escapeHtml(value) + "</span>";
            if (statusUpper.indexOf("X LAVAR") !== -1) return '<span class="pill pill-pda">' + escapeHtml(value) + "</span>";
            return escapeHtml(value);
        }

        function showLoader(show) {
            const el = document.getElementById("loader");
            if (el) el.style.visibility = show ? "visible" : "hidden";
        }

        function setUiBusy(show, message) {
            uiBusy = !!show;
            const modal = document.getElementById("saving-modal");
            const modalText = document.getElementById("saving-modal-text");
            if (modalText && message) modalText.textContent = message;
            if (modal) {
                modal.classList.toggle("show", uiBusy);
                modal.setAttribute("aria-hidden", uiBusy ? "false" : "true");
            }

            const controls = document.querySelectorAll("button, select, input[type='checkbox']");
            controls.forEach(ctrl => {
                ctrl.disabled = uiBusy;
            });
        }

        function setStatus(message, tone) {
            const el = document.getElementById("status-msg");
            if (!el) return;
            el.textContent = message || "";
            el.className = "status-msg";
            if (tone === "ok") el.classList.add("ok");
            if (tone === "error") el.classList.add("error");
        }

        function findHeaderIndex(headers, candidates) {
            const normalized = candidates.map(c => normalizeHeaderName(c));
            for (let i = 0; i < headers.length; i++) {
                const hNorm = normalizeHeaderName(headers[i]);
                if (normalized.includes(hNorm)) return i;
            }
            return -1;
        }

        function canonicalizeHiloValue(value) {
            const raw = String(value || "").trim();
            if (!raw) return FILTER_PENDIENTE;
            const norm = normalizeText(raw);
            if (HILO_CANON[norm]) return HILO_CANON[norm];
            return raw;
        }

        function canonicalizeStatusValue(value) {
            return normalizeText(value);
        }

        function rowMatchesTab(row) {
            const isDespachado = canonicalizeHiloValue(row.hiloRaw) === FILTER_DESPACHADO;
            return selectedTab === TAB_DESPACHADO ? isDespachado : !isDespachado;
        }

        function makeGroupKey(op, color) {
            const opNorm = String(op || "").trim().toUpperCase();
            const colorNorm = String(color || "").trim().toUpperCase();
            if (!opNorm || !colorNorm) return "";
            return opNorm + "||" + colorNorm;
        }

        function rowMatchesStatusFilter(row) {
            if (selectedStatusFilter === FILTER_ALL) return true;
            return canonicalizeStatusValue(getHabilitadoStatusValue(row)) === canonicalizeStatusValue(selectedStatusFilter);
        }

        function getRowsAfterPrimaryFilters() {
            const tabRows = allRows.filter(rowMatchesTab);
            const hiloRows = (selectedFilter === FILTER_ALL)
                ? tabRows
                : tabRows.filter(r => canonicalizeHiloValue(r.hiloRaw) === selectedFilter);
            if (selectedStatusFilter === FILTER_ALL) return hiloRows;
            return hiloRows.filter(rowMatchesStatusFilter);
        }

        function rowMatchesCurrentSideFilters(row, excludeKey) {
            if (excludeKey !== "client" && selectedClientFilter !== FILTER_ALL && row.clienteNorm !== selectedClientFilter) return false;
            if (excludeKey !== "rsv" && selectedRsvFilter !== FILTER_ALL && String(row.rsv || "") !== selectedRsvFilter) return false;
            if (excludeKey !== "color" && selectedColorFilter !== FILTER_ALL && String(row.color || "") !== selectedColorFilter) return false;
            if (excludeKey !== "op" && selectedOpFilter !== FILTER_ALL && String(row.op || "") !== selectedOpFilter) return false;
            return true;
        }

        function getRowsForFilterOptions(filterKey) {
            return getRowsAfterPrimaryFilters().filter(row => rowMatchesCurrentSideFilters(row, filterKey));
        }

        function getRowsForStatusOptions() {
            const tabRows = allRows.filter(rowMatchesTab);
            const hiloRows = (selectedFilter === FILTER_ALL)
                ? tabRows
                : tabRows.filter(r => canonicalizeHiloValue(r.hiloRaw) === selectedFilter);
            return hiloRows.filter(row => rowMatchesCurrentSideFilters(row, null));
        }

        function getFilteredRows() {
            const rows = getRowsAfterPrimaryFilters().filter(row => rowMatchesCurrentSideFilters(row, null));
            rows.sort((a, b) => {
                const byClient = String(a.clienteNorm || "").localeCompare(String(b.clienteNorm || ""), undefined, { sensitivity: "base" });
                if (byClient !== 0) return byClient;

                const byRsv = String(a.rsv || "").localeCompare(String(b.rsv || ""), undefined, { numeric: true, sensitivity: "base" });
                if (byRsv !== 0) return byRsv;

                return String(a.color || "").localeCompare(String(b.color || ""), undefined, { sensitivity: "base" });
            });
            return rows;
        }

        function fillSelectOptions(selectId, values, selectedValue) {
            const select = document.getElementById(selectId);
            if (!select) return;

            const allOpts = [FILTER_ALL].concat(values);
            let finalSelected = selectedValue;
            if (!allOpts.includes(finalSelected)) finalSelected = FILTER_ALL;

            select.innerHTML = allOpts.map(v => {
                const label = (v === FILTER_ALL) ? "Todos" : v;
                const selected = (v === finalSelected) ? " selected" : "";
                return "<option value=\"" + escapeHtml(v) + "\"" + selected + ">" + escapeHtml(label) + "</option>";
            }).join("");

            return finalSelected;
        }

        function rebuildRightFilters() {
            const statusRows = getRowsForStatusOptions();
            const statusOptions = Array.from(new Set(statusRows.map(r => String(getHabilitadoStatusValue(r) || "").trim()).filter(Boolean)))
                .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: "base" }));
            selectedStatusFilter = fillSelectOptions("filter-status", statusOptions, selectedStatusFilter) || FILTER_ALL;

            const clientRows = getRowsForFilterOptions("client");
            const clients = Array.from(new Set(clientRows.map(r => String(r.clienteNorm || "").trim()).filter(Boolean)))
                .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: "base" }));
            selectedClientFilter = fillSelectOptions("filter-cliente", clients, selectedClientFilter) || FILTER_ALL;

            const rsvRows = getRowsForFilterOptions("rsv");
            const rsvs = Array.from(new Set(rsvRows.map(r => String(r.rsv || "").trim()).filter(Boolean)))
                .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: "base" }));
            selectedRsvFilter = fillSelectOptions("filter-rsv", rsvs, selectedRsvFilter) || FILTER_ALL;

            const colorRows = getRowsForFilterOptions("color");
            const colors = Array.from(new Set(colorRows.map(r => String(r.color || "").trim()).filter(Boolean)))
                .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: "base" }));
            selectedColorFilter = fillSelectOptions("filter-color", colors, selectedColorFilter) || FILTER_ALL;

            const opRows = getRowsForFilterOptions("op");
            const ops = Array.from(new Set(opRows.map(r => String(r.op || "").trim()).filter(Boolean)))
                .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: "base" }));
            selectedOpFilter = fillSelectOptions("filter-op", ops, selectedOpFilter) || FILTER_ALL;
        }

        function updateMeta(count) {
            const meta = document.getElementById("meta-registros");
            if (!meta) return;
            meta.textContent = Number(count || 0).toLocaleString("es-ES") + " registros";
        }

        function onFilterChange(value) {
            if (uiBusy) return;
            selectedFilter = value || FILTER_ALL;
            rebuildRightFilters();
            renderTable();
        }

        function onStatusFilterChange(value) {
            if (uiBusy) return;
            selectedStatusFilter = value || FILTER_ALL;
            rebuildRightFilters();
            renderTable();
        }

        function setActiveTabUi() {
            const porDespacharBtn = document.getElementById("tab-por-despachar");
            const despachadoBtn = document.getElementById("tab-despachado");
            if (porDespacharBtn) porDespacharBtn.classList.toggle("active", selectedTab === TAB_POR_DESPACHAR);
            if (despachadoBtn) despachadoBtn.classList.toggle("active", selectedTab === TAB_DESPACHADO);
        }

        function onTabChange(tabValue) {
            if (uiBusy) return;
            selectedTab = (tabValue === TAB_DESPACHADO) ? TAB_DESPACHADO : TAB_POR_DESPACHAR;
            setActiveTabUi();
            rebuildRightFilters();
            renderTable();
        }

        function onClientFilterChange(value) {
            if (uiBusy) return;
            selectedClientFilter = value || FILTER_ALL;
            rebuildRightFilters();
            renderTable();
        }

        function onRsvFilterChange(value) {
            if (uiBusy) return;
            selectedRsvFilter = value || FILTER_ALL;
            rebuildRightFilters();
            renderTable();
        }

        function onColorFilterChange(value) {
            if (uiBusy) return;
            selectedColorFilter = value || FILTER_ALL;
            rebuildRightFilters();
            renderTable();
        }

        function onOpFilterChange(value) {
            if (uiBusy) return;
            selectedOpFilter = value || FILTER_ALL;
            rebuildRightFilters();
            renderTable();
        }

        function onParaTodoChange(checked) {
            if (uiBusy) return;
            applyParaTodo = !!checked;
        }

        function buildSelectHtml(row) {
            return "<select class=\"hilo-select\" data-row-index=\"" + row.rawIndex + "\" onchange=\"handleHiloChange(" + row.rawIndex + ", this.value, this)\">" + getHiloSelectOptionsHtml(row.hiloRaw) + "</select>";
        }

        function renderTable() {
            const tbody = document.getElementById("tbody-hilos-costura");
            const filtered = getFilteredRows();
            updateMeta(filtered.length);

            if (!filtered.length) {
                const tabLabel = selectedTab === TAB_DESPACHADO ? "DESPACHADO" : "POR DESPACHAR";
                const parts = [];
                if (selectedStatusFilter !== FILTER_ALL) parts.push("STATUS = " + selectedStatusFilter);
                if (selectedFilter !== FILTER_ALL) parts.push("HILO COSTURA = " + selectedFilter);
                const msg = parts.length
                    ? "No hay registros con " + parts.join(" y ") + " en la pesta\u00F1a " + tabLabel + "."
                    : "No hay registros para la pesta\u00F1a " + tabLabel + " con los filtros seleccionados.";
                tbody.innerHTML = "<tr><td class=\"no-data\" colspan=\"11\">" + escapeHtml(msg) + "</td></tr>";
                return;
            }

            let lastColorKey = null;
            let currentBandClass = "group-a";

            let html = "";
            for (let idx = 0; idx < filtered.length; idx++) {
                const row = filtered[idx];
                const colorKey = String(row.color || "").trim().toUpperCase();
                if (lastColorKey !== null && colorKey !== lastColorKey) {
                    currentBandClass = (currentBandClass === "group-a") ? "group-b" : "group-a";
                }
                lastColorKey = colorKey;

                const trClass = currentBandClass;
                const statusValue = getHabilitadoStatusValue(row);
                html += ""
                    + "<tr class=\"" + trClass + "\">"
                    + "<td class=\"cell-date\">" + escapeHtml(formatHiloDateCell(row.hod)) + "</td>"
                    + "<td class=\"cell-date\">" + escapeHtml(formatHiloDateCell(row.fing)) + "</td>"
                    + "<td class=\"cell-rsv\">" + escapeHtml(row.rsv) + "</td>"
                    + "<td class=\"cell-cliente\" title=\"" + escapeHtml(row.clienteNorm) + "\">" + escapeHtml(row.clienteNorm) + "</td>"
                    + "<td title=\"" + escapeHtml(row.estilo) + "\">" + escapeHtml(row.estilo) + "</td>"
                    + "<td title=\"" + escapeHtml(row.color) + "\">" + escapeHtml(row.color) + "</td>"
                    + "<td class=\"cell-op\" title=\"" + escapeHtml(row.op) + "\">" + escapeHtml(row.op) + "</td>"
                    + "<td class=\"cell-pds\" title=\"" + escapeHtml(row.pdsGiradas) + "\">" + escapeHtml(row.pdsGiradas) + "</td>"
                    + "<td class=\"cell-pds\" title=\"" + escapeHtml(row.pda) + "\">" + escapeHtml(row.pda) + "</td>"
                    + "<td class=\"cell-status\" title=\"" + escapeHtml(statusValue) + "\">" + renderStatusPill(statusValue) + "</td>"
                    + "<td>" + buildSelectHtml(row) + "</td>"
                    + "</tr>";
            }
            tbody.innerHTML = html;
        }

        function isLikelyCorsFetchError(error) {
            const msg = String(error && error.message ? error.message : error).toLowerCase();
            if (!msg) return false;
            return msg.includes("failed to fetch")
                || msg.includes("networkerror")
                || msg.includes("cors")
                || msg.includes("load failed");
        }

        async function saveHiloValueForRow(row, newValue) {
            const targetRow = Number(row.rawIndex);
            if (!Number.isFinite(targetRow) || targetRow <= 0) {
                throw new Error("Fila invalida para guardar en sheet.");
            }

            const payload = {
                action: "update",
                row: targetRow,
                colName: hiloColHeaderName,
                value: newValue,
                sourceOp: row.sourceOp,
                sourceCorte: row.sourceCorte,
                sourceOpTela: row.sourceOpTela,
                sourcePartida: row.sourcePartida,
                sourceColor: row.sourceColor
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });

                const responseText = await response.text();
                let result = null;
                try {
                    result = JSON.parse(responseText);
                } catch (e) {
                    result = null;
                }

                if (!response.ok || !result || result.result !== "success") {
                    const msg = (result && result.message) ? result.message : "Error al guardar en sheet.";
                    throw new Error(msg);
                }
                return { assumedSuccess: false };
            } catch (error) {
                if (!isLikelyCorsFetchError(error)) {
                    throw error;
                }

                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });
                return { assumedSuccess: true };
            }
        }

        async function handleHiloChange(rawIndex, selectedValue, selectElement) {
            if (uiBusy) return;
            const sourceRow = allRows.find(r => r.rawIndex === rawIndex);
            if (!sourceRow) return;

            const groupKey = makeGroupKey(sourceRow.op, sourceRow.color);
            const lockKey = applyParaTodo ? "__PARA_TODO__" : (groupKey || ("ROW|" + rawIndex));
            if (savingGroupKeys.has(lockKey)) return;
            savingGroupKeys.add(lockKey);

            let targets = [];
            if (applyParaTodo) {
                targets = getFilteredRows();
            } else {
                targets = groupKey
                    ? allRows.filter(r => makeGroupKey(r.op, r.color) === groupKey)
                    : [sourceRow];
            }
            if (!targets.length) targets = [sourceRow];
            const uniqueByRow = new Map();
            targets.forEach(r => {
                uniqueByRow.set(r.rawIndex, r);
            });
            targets = Array.from(uniqueByRow.values());

            const shouldShowModal = applyParaTodo && targets.length > 0;
            if (shouldShowModal) {
                setUiBusy(true, "Guardando datos...");
            }

            const previousByIndex = {};
            targets.forEach(r => {
                previousByIndex[r.rawIndex] = r.hiloRaw;
                r.hiloRaw = selectedValue;
            });

            renderTable();
            setStatus("Guardando " + targets.length + " fila(s)...", "");

            try {
                let assumedSuccessCount = 0;
                for (let i = 0; i < targets.length; i++) {
                    if (applyParaTodo) {
                        setStatus("Guardando " + (i + 1) + " de " + targets.length + " fila(s)...", "");
                    }
                    const saveResult = await saveHiloValueForRow(targets[i], selectedValue);
                    if (saveResult && saveResult.assumedSuccess) {
                        assumedSuccessCount++;
                    }
                }

                if (applyParaTodo) {
                    if (assumedSuccessCount > 0) {
                        setStatus("Actualizado en " + targets.length + " fila(s) visibles (Para Todo). Modo compatibilidad local activo.", "ok");
                    } else {
                        setStatus("Actualizado en " + targets.length + " fila(s) visibles (Para Todo).", "ok");
                    }
                } else {
                    const opLabel = String(sourceRow.op || "").trim() || "(sin OP)";
                    const colorLabel = String(sourceRow.color || "").trim() || "(sin COLOR)";
                    setStatus("Actualizado: " + targets.length + " fila(s) para OP " + opLabel + " + COLOR " + colorLabel + ".", "ok");
                }
            } catch (error) {
                targets.forEach(r => { r.hiloRaw = previousByIndex[r.rawIndex]; });
                renderTable();
                setStatus("Error al guardar: " + (error && error.message ? error.message : String(error)), "error");
                console.error(error);
            } finally {
                if (shouldShowModal) {
                    setUiBusy(false);
                }
                savingGroupKeys.delete(lockKey);
            }
        }

        function processData(data) {
            if (!Array.isArray(data) || data.length === 0) {
                throw new Error("Datos vacios del sheet.");
            }

            rawHeaders = (data[0] || []).map(h => String(h || "").trim());
            const rows = data.slice(1);

            const colRsv = findHeaderIndex(rawHeaders, ["RSV"]);
            const colCliente = findHeaderIndex(rawHeaders, ["CLIENTE"]);
            const colEstilo = findHeaderIndex(rawHeaders, ["ESTILO"]);
            const colColor = findHeaderIndex(rawHeaders, ["COLOR"]);
            const colOp = findHeaderIndex(rawHeaders, ["OP"]);
            const colPds = findHeaderIndex(rawHeaders, ["PDS GIRADAS", "PDS_GIRADAS", "PDS"]);
            const colPda = findHeaderIndex(rawHeaders, ["PRENDA", "PDA"]);
            const colHod = findHeaderIndex(rawHeaders, ["F. DESPACHO", "F_DESPACHO", "F. DESP", "F DESPACHO"]);
            const colFIng = findHeaderIndex(rawHeaders, ["F.ING.COST", "F_ING_COST", "F. ING.COST", "F ING COST", "F.ING", "F_ING", "F. ING", "F ING"]);
            const colRutaTela = findHeaderIndex(rawHeaders, ["RUTA TELA", "RUTA_TELA", "RUTA"]);
            const colEstadoCorte = findHeaderIndex(rawHeaders, ["STATUS_CORTE", "STATUS", "estado_corte", "ESTADO_CORTE"]);
            const colEstadoBloqueo = findHeaderIndex(rawHeaders, ["estado_bloqueo", "ESTADO_BLOQUEO"]);
            const colEstadoLavada = findHeaderIndex(rawHeaders, ["estado_lavada", "ESTADO_LAVADA"]);
            const colEstadoEnumerado = findHeaderIndex(rawHeaders, ["estado_enumerado", "ESTADO_ENUMERADO", "ESTADO ENUMERADO"]);
            const colHilo = findHeaderIndex(rawHeaders, ["HILO COSTURA", "HILO_COSTURA"]);

            const colCorte = findHeaderIndex(rawHeaders, ["CORTE"]);
            const colOpTela = findHeaderIndex(rawHeaders, ["OP TELA", "OP_TELA"]);
            const colPartida = findHeaderIndex(rawHeaders, ["PARTIDA"]);

            const required = [
                { idx: colRsv, name: "RSV" },
                { idx: colCliente, name: "CLIENTE" },
                { idx: colEstilo, name: "ESTILO" },
                { idx: colColor, name: "COLOR" },
                { idx: colOp, name: "OP" },
                { idx: colHilo, name: "HILO COSTURA" }
            ];
            const missing = required.filter(c => c.idx === -1).map(c => c.name);
            if (missing.length) {
                throw new Error("Faltan columnas requeridas: " + missing.join(", "));
            }

            hiloColHeaderName = rawHeaders[colHilo] || "HILO COSTURA";
            resetHiloSelectOptionsCache();

            allRows = rows
                .map((row, idx) => {
                    const clienteRaw = row[colCliente] || "";
                    const clienteNormalized = normalizeClientName(clienteRaw);
                    return {
                        rawIndex: idx + 1,
                        hod: colHod !== -1 ? row[colHod] : "",
                        fing: colFIng !== -1 ? row[colFIng] : "",
                        rsv: row[colRsv] || "",
                        cliente: clienteRaw,
                        clienteNorm: clienteNormalized,
                        estilo: row[colEstilo] || "",
                        color: row[colColor] || "",
                        op: row[colOp] || "",
                        pdsGiradas: colPds !== -1 ? (row[colPds] || "") : "",
                        pda: colPda !== -1 ? (row[colPda] || "") : "",
                        rutaTela: colRutaTela !== -1 ? (row[colRutaTela] || "") : "",
                        estadoCorte: colEstadoCorte !== -1 ? (row[colEstadoCorte] || "") : "",
                        estadoBloqueo: colEstadoBloqueo !== -1 ? (row[colEstadoBloqueo] || "") : "",
                        estadoLavada: colEstadoLavada !== -1 ? (row[colEstadoLavada] || "") : "",
                        estadoEnumerado: colEstadoEnumerado !== -1 ? (row[colEstadoEnumerado] || "") : "",
                        hiloRaw: row[colHilo] || "",
                        sourceOp: row[colOp] || "",
                        sourceCorte: colCorte !== -1 ? (row[colCorte] || "") : "",
                        sourceOpTela: colOpTela !== -1 ? (row[colOpTela] || "") : "",
                        sourcePartida: colPartida !== -1 ? (row[colPartida] || "") : "",
                        sourceColor: row[colColor] || ""
                    };
                })
                .filter(row => !isExcludedClient(row.cliente, row.clienteNorm));
        }

        function loadDataFromWebApp() {
            return fetch(WEB_APP_URL).then(response => {
                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }
                return response.json();
            });
        }

        function loadDataFromGviz(loadToken) {
            return new Promise((resolve, reject) => {
                const callbackName = "__hiloCosturaGvizCallback_" + loadToken + "_" + Date.now();
                const script = document.createElement("script");
                let finished = false;

                const cleanup = () => {
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                    try {
                        delete window[callbackName];
                    } catch (e) {
                        window[callbackName] = undefined;
                    }
                };

                window[callbackName] = function (jsonResponse) {
                    if (finished) return;
                    finished = true;
                    try {
                        if (loadToken !== activeLoadToken) {
                            resolve(null);
                            return;
                        }
                        resolve(sheetDataFromGviz(jsonResponse));
                    } catch (error) {
                        reject(error);
                    } finally {
                        cleanup();
                    }
                };

                script.async = true;
                script.onerror = function () {
                    if (finished) return;
                    finished = true;
                    cleanup();
                    reject(new Error("No se pudo cargar Google Sheets."));
                };
                script.src = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=responseHandler:" + callbackName;
                document.body.appendChild(script);
            });
        }

        function renderCachedDataIfAvailable() {
            const cachedData = normalizeSheetDataArray(getCachedSheetData());
            if (!cachedData) return false;

            try {
                processData(cachedData);
                rebuildRightFilters();
                renderTable();
                return true;
            } catch (error) {
                console.warn("Cache de Hilo Costura invalido, se omite.", error);
                return false;
            }
        }

        async function reloadData() {
            const loadToken = ++activeLoadToken;
            showLoader(true);
            setStatus("", "");
            selectedTab = TAB_POR_DESPACHAR;
            setActiveTabUi();

            const hasCache = renderCachedDataIfAvailable();
            if (hasCache) {
                showLoader(false);
            }

            try {
                let data = null;
                try {
                    data = await loadDataFromGviz(loadToken);
                    if (!data) return;
                } catch (gvizError) {
                    console.warn("Fallo gviz, usando web app como respaldo.", gvizError);
                    data = await loadDataFromWebApp();
                }

                if (loadToken !== activeLoadToken) return;

                processData(data);
                saveSheetDataCache(data);
                rebuildRightFilters();
                renderTable();
                if (hasCache) {
                    setStatus("Datos actualizados.", "ok");
                }
            } catch (error) {
                if (loadToken !== activeLoadToken) return;
                console.error("Error cargando datos:", error);
                const tbody = document.getElementById("tbody-hilos-costura");
                if (!hasCache) {
                    tbody.innerHTML = "<tr><td class=\"no-data\" colspan=\"11\">Error al cargar datos: " + escapeHtml(error.message || String(error)) + "</td></tr>";
                    document.getElementById("meta-registros").textContent = "0 registros";
                } else {
                    setStatus("No se pudo actualizar. Se muestra la ultima version guardada.", "error");
                }
            } finally {
                if (loadToken === activeLoadToken) {
                    showLoader(false);
                }
            }
        }

        window.addEventListener("DOMContentLoaded", () => {
            setActiveTabUi();
            requestAnimationFrame(() => reloadData());
        });
    </script>
</body>
</html>
